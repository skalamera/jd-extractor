<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preparing document…</title>
  <style id="_loading_style">
    body { margin: 0; background: #f7f8fb; font-family: system-ui, sans-serif; }
    #_loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; gap: 14px; color: #6b7280;
    }
    #_loading .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(139,92,246,0.15);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #_loading p { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <div id="_loading">
    <div class="spinner"></div>
    <p>Preparing document&hellip;</p>
  </div>
  <script src="print.js"></script>
</body>
</html>
