<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Text Clipper – Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #666; margin-bottom: 28px; line-height: 1.5; }

    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }

    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #4f46e5; }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      padding: 10px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }

    #status {
      font-size: 13px;
      font-weight: 600;
      color: #16a34a;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status.show { opacity: 1; }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }
    .hint a { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Text Clipper Settings</h1>
    <p class="sub">Configure your Gemini API key to enable AI-powered job application answers.</p>

    <label for="api-key">Gemini API Key</label>
    <input type="password" id="api-key" placeholder="AIza..." autocomplete="off" />

    <div class="row">
      <button id="btn-save">Save</button>
      <span id="status">Saved ✓</span>
    </div>

    <p class="hint">
      Get a free API key at
      <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>.<br>
      Your key is stored locally in your browser and never sent anywhere except Google's API.
    </p>
  </div>

  <script src="options.js"></script>
</body>
</html>
