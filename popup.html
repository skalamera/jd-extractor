<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jayobee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 460px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      font-size: 13px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      position: relative;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: -0.01em;
      margin: 0;
      z-index: 1;
    }
    header h1 img {
      display: none;
    }
    
    header .center-icon {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      height: 40px;
      width: 40px;
    }
    
    header .header-actions {
      margin-left: auto;
      z-index: 1;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .tab-count {
      background: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 6px;
      border: 1px solid rgba(56, 189, 248, 0.25);
    }
    .tab.active .tab-count {
      background: #0284c7;
      color: #fff;
      border-color: transparent;
    }

    .header-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #38bdf8;
      font-size: 22px;
      padding: 4px;
      line-height: 1;
      transition: transform 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .header-btn:hover { transform: scale(1.1); color: #0ea5e9; }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: rgba(15, 23, 42, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 12px 0;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #f1f5f9; }
    .tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }
    
    .tracker-filters {
      display: none;
      padding: 8px 16px;
      background: rgba(30, 41, 59, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      align-items: center;
      gap: 12px;
    }
    .tracker-filters input[type="date"] {
      padding: 4px 8px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      color: #f1f5f9;
      outline: none;
    }
    .tracker-filters input[type="date"]:focus { border-color: #38bdf8; }
    .clear-date-btn {
      background: none; border: none; font-size: 11px; color: #f87171; cursor: pointer;
      display: none;
    }
    .clear-date-btn:hover { text-decoration: underline; }
    .sort-toggle-label {
      font-size: 11px;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      margin-left: auto;
    }

    /* ── Resume Indicator ───────────────────────────────── */
    #resume-indicator {
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.35);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .res-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .res-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #94a3b8;
    }
    .res-name {
      font-size: 12px; font-weight: 600; color: #4ade80;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .res-name.tailored { color: #fbbf24; }
    .res-actions { display: flex; gap: 6px; }
    .btn-res-action {
      font-size: 10px; font-weight: 600; padding: 5px 8px; border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: #cbd5e1; cursor: pointer; transition: all 0.15s;
    }
    .btn-res-action:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
    .btn-res-action:disabled { opacity: 0.5; pointer-events: none; }
    #btn-dl-plain { display: none; color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.1); }
    #btn-dl-plain:hover { background: rgba(251, 191, 36, 0.2); border-color: rgba(251, 191, 36, 0.5); }

    /* ── Clips container ────────────────────────────────── */
    #clips-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #clips-container::-webkit-scrollbar { width: 4px; }
    #clips-container::-webkit-scrollbar-track { background: transparent; }
    #clips-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }

    /* ── Empty state ────────────────────────────────────── */
    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      padding: 52px 24px;
      line-height: 1.7;
    }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.35; }

    /* ── Date Group Header ──────────────────────────────── */
    .date-group-header {
      font-size: 11px;
      font-weight: 700;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 8px 0 4px 0;
      padding: 6px 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: color 0.15s, background-color 0.15s;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .date-group-header:hover {
      color: #f1f5f9;
      background-color: rgba(255, 255, 255, 0.05);
    }
    .date-group-header .chevron {
      transition: transform 0.2s ease;
      font-size: 10px;
    }
    .date-group-header.collapsed .chevron {
      transform: rotate(-90deg);
    }
    .date-group-header .group-count {
      display: none;
      margin-left: 6px;
      color: #94a3b8;
      font-size: 10px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }
    .date-group-header.collapsed .group-count {
      display: inline-block;
    }
    
    .group-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .group-items.collapsed {
      display: none;
    }

    /* ── Clip card ──────────────────────────────────────── */
    .clip {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      position: relative;
      transition: box-shadow 0.2s, border-color 0.2s;
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
    }
    .clip:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.1);
    }

    /* Active card */
    .clip.active {
      border-left-color: #38bdf8;
      background: rgba(30, 41, 59, 0.65);
    }

    .active-label {
      display: none;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #38bdf8;
      margin-bottom: 6px;
    }
    .clip.active .active-label { display: block; }

    /* Card header (Title, Company, Location) */
    .clip-header-info {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-right: 20px; /* space for delete button */
    }
    .clip-job-title {
      font-size: 14px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 3px;
      line-height: 1.3;
      flex: 1;
    }
    .clip-job-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s;
    }
    .clip-job-title a:hover {
      color: #0ea5e9;
      text-decoration: underline;
    }
    .clip-score {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.2s;
    }
    .clip-score:hover { transform: scale(1.05); }
    .clip-score.excellent { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
    .clip-score.good { background: rgba(253, 224, 71, 0.1); color: #fde047; border: 1px solid rgba(253, 224, 71, 0.2); }
    .clip-score.fair { background: rgba(249, 115, 22, 0.1); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.2); }
    .clip-score.poor { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .clip-score.pending { background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.1); cursor: default; }

    .clip-company-meta {
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
    }
    .editable-title, .editable-company {
      outline: none;
      border-bottom: 1px dashed transparent;
      transition: border-bottom-color 0.2s;
    }
    .editable-title:hover, .editable-company:hover,
    .editable-title:focus, .editable-company:focus {
      border-bottom-color: rgba(255, 255, 255, 0.2);
    }
    .clip-arch-meta {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      margin-top: 2px;
    }

    .clip-gap-analysis {
      display: none;
      background: rgba(15, 23, 42, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.4;
      color: #cbd5e1;
    }
    .clip-gap-analysis.show { display: block; }
    .clip-gap-analysis strong { color: #38bdf8; }
    .clip-gap-row { margin-bottom: 4px; }
    .clip-gap-row:last-child { margin-bottom: 0; }

    /* Card top row */
    .clip-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .clip-text {
      font-size: 12px;
      line-height: 1.5;
      color: #cbd5e1;
      word-break: break-word;
      white-space: pre-wrap;
      max-height: 40px;
      overflow: hidden;
      flex: 1;
      -webkit-mask-image: linear-gradient(to bottom, #000 50%, transparent 100%);
      mask-image: linear-gradient(to bottom, #000 50%, transparent 100%);
      cursor: pointer;
      transition: max-height 0.3s ease;
    }

    .clip-text.expanded {
      max-height: none;
      -webkit-mask-image: none;
      mask-image: none;
    }

    .clip-text:hover {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .clip-delete {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      z-index: 10;
    }
    .clip-delete:hover { color: #f87171; background: rgba(239, 68, 68, 0.1); }

    /* Move delete button down slightly when status header is present so they don't overlap */
    .clip:has(.status-dropdown.full-width) .clip-delete {
      top: 40px;
    }

    /* Meta row */
    .clip-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .clip-url {
      font-size: 11px;
      color: #cbd5e1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .clip-date {
      font-size: 10px;
      color: #6a6e6a;
      white-space: nowrap;
    }

    /* ── Action bar ─────────────────────────────────────── */
    .clip-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Dropdown */
    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown-menu {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 4px;
      background-color: #1e293b;
      min-width: 160px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      z-index: 100;
      overflow: hidden;
    }
    .dropdown-menu.show {
      display: block;
      animation: fadeIn 0.15s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .dropdown-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: #cbd5e1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .dropdown-item:last-child {
      border-bottom: none;
    }
    .dropdown-item:hover {
      background-color: rgba(255, 255, 255, 0.05);
      color: #38bdf8;
    }
    .dropdown-item.primary-item {
      background: #0284c7;
      color: #ffffff;
      font-weight: 600;
    }
    .dropdown-item.primary-item:hover {
      background: #0ea5e9;
    }
    .dropdown-item:disabled { opacity: 0.5; cursor: default; }

    .btn-action {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-action:hover { border-color: #38bdf8; color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
    .btn-action:disabled { opacity: 0.45; cursor: default; pointer-events: none; }

    .btn-action.primary {
      background: #0284c7;
      color: #ffffff;
      border-color: transparent;
      font-weight: 600;
    }
    .btn-action.primary:hover { background: #0ea5e9; }

    .btn-action.btn-linkedin {
      background: #0a66c2;
      color: #ffffff;
      border-color: transparent;
      font-weight: 600;
    }
    .btn-action.btn-linkedin:hover { background: #004182; color: #ffffff; opacity: 1; }

    .btn-action.btn-doc {
      background: rgba(251, 191, 36, 0.1);
      border-color: rgba(251, 191, 36, 0.3);
      color: #fbbf24;
    }
    .btn-action.btn-doc:hover {
      background: rgba(251, 191, 36, 0.2);
      border-color: rgba(251, 191, 36, 0.5);
    }

    .btn-action.btn-prep {
      background: rgba(168, 85, 247, 0.1);
      border-color: rgba(168, 85, 247, 0.3);
      color: #c084fc;
    }
    .btn-action.btn-prep:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.5);
    }

    .btn-action.btn-clyde {
      background: rgba(56, 189, 248, 0.1);
      border-color: rgba(56, 189, 248, 0.3);
      color: #38bdf8;
    }
    .btn-action.btn-clyde:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: rgba(56, 189, 248, 0.5);
    }

    .btn-active {
      font-size: 10px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-active:hover { border-color: #38bdf8; color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
    .clip.active .btn-active { display: none; }

    /* Icon Buttons */
    .icon-btn {
      background: none;
      border: none;
      color: #475569;
      padding: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .icon-btn:hover { transform: scale(1.15); }
    
    .icon-btn.heart:hover { color: #f87171; }
    .icon-btn.heart.saved { color: #ef4444; }
    
    .icon-btn.star:hover { color: #fbbf24; }
    .icon-btn.star.active-jd { color: #f59e0b; }
    
    .icon-btn.bookmark:hover { color: #34d399; }
    .icon-btn.bookmark.tracked { color: #10b981; }

    /* Applied Toggle Switch */
    .toggle-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .toggle-label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
    }
    .toggle {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255, 255, 255, 0.15); transition: .3s; border-radius: 18px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px;
      background-color: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #10b981; }
    input:checked + .slider:before { transform: translateX(14px); }

    /* Status Dropdown (Tracker Tab) */
    .status-dropdown {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      background-color: rgba(15, 23, 42, 0.5);
      color: #f1f5f9;
      cursor: pointer;
      margin-left: auto;
    }
    .status-dropdown.full-width {
      display: block;
      width: calc(100% + 32px);
      margin: -14px -16px 12px -16px;
      border-radius: 10px 10px 0 0;
      border-top: none;
      border-left: none;
      border-right: none;
      padding: 8px 16px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }
    .status-dropdown.Applied { color: #60a5fa; border-color: rgba(96, 165, 250, 0.3); background-color: rgba(96, 165, 250, 0.1); }
    .status-dropdown.Interviewing { color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); background-color: rgba(251, 191, 36, 0.1); }
    .status-dropdown.Rejected { color: #f87171; border-color: rgba(248, 113, 113, 0.3); background-color: rgba(248, 113, 113, 0.1); }
    .status-dropdown.Accepted { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); background-color: rgba(74, 222, 128, 0.1); }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      width: 11px;
      height: 11px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    .btn-action:not(.primary) .spinner {
      border-color: rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Generation feedback ─────────────────────────────── */
    .gen-feedback {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, margin 0.25s ease, padding 0.25s ease;
    }
    .gen-feedback.show {
      max-height: 40px;
      margin-top: 8px;
    }
    .gen-status {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
    }
    .gen-status.success { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
    .gen-status.error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
  </style>
</head>
<body>
  <header>
    <img src="icons/clyde-header-logo.svg" alt="Clyde" style="height: 24px !important; width: auto !important; display: block !important; margin: 0 !important; z-index: 1 !important;">
    <img src="icons/popup_ui_header.svg" alt="logo" class="center-icon">
    <div class="header-actions">
      <button id="btn-guide" class="header-btn" title="User Guide" style="color: #38bdf8 !important;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </button>
      <button id="btn-settings" class="header-btn" title="Settings" style="color: #38bdf8 !important; font-size: 22px !important; font-family: sans-serif !important; display: flex !important; align-items: center !important;">&#9881;</button>
    </div>
  </header>

  <div class="tabs" style="background: rgba(15, 23, 42, 0.6) !important; border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;">
    <button class="tab active" data-tab="clips">Pipeline <span class="tab-count" id="count-clips">0</span></button>
    <button class="tab" data-tab="saved">Saved <span class="tab-count" id="count-saved">0</span></button>
    <button class="tab" data-tab="tracker">Tracker <span class="tab-count" id="count-tracker">0</span></button>
    <button class="tab" data-tab="archived">Archived <span class="tab-count" id="count-archived">0</span></button>
  </div>

  <div id="get-jd-container" style="padding: 12px 16px !important; background: rgba(15, 23, 42, 0.5) !important; border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; display: flex !important; align-items: center !important;">
    <button id="btn-get-jd" style="width: 100% !important; padding: 12px !important; background: #10b981 !important; color: #000000 !important; border: none !important; border-radius: 8px !important; font-weight: 800 !important; font-size: 13px !important; letter-spacing: 0.08em !important; text-transform: uppercase !important; font-family: 'Space Grotesk', 'Orbitron', 'Inter', sans-serif !important; cursor: pointer !important; transition: opacity 0.15s !important;">Get Job Description</button>
  </div>

  <div class="tracker-filters" id="tracker-filters" style="display: flex;">
    <select id="group-by-select" style="padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 4px; font-family: inherit; font-size: 11px; color: #374151; outline: none; background: #fff; cursor: pointer;">
      <option value="status">Group by Status</option>
      <option value="date">Group by Date</option>
    </select>
    <input type="text" id="tracker-search" placeholder="Search..." style="padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 4px; font-family: inherit; font-size: 11px; color: #374151; outline: none; flex: 1;" />
    <input type="date" id="date-picker" title="Filter by Date" />
    <button class="clear-date-btn" id="clear-date-btn">Clear Filter</button>
    <label class="sort-toggle-label">
      <input type="checkbox" id="sort-rating-toggle" checked />
      Sort by Rating
    </label>
  </div>

  <div id="resume-indicator" style="display: none;">
    <div class="res-info">
      <span class="res-label">Active Resume</span>
      <span class="res-name" id="res-name-el">Loading...</span>
    </div>
    <div class="res-actions">
      <button class="btn-res-action" id="btn-dl-plain" title="Download Plain Text Resume (ATS-friendly)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-top; margin-right: 2px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        txt
      </button>
      <button class="btn-res-action" id="btn-replace-res" title="Upload new Master PDF">Replace</button>
    </div>
    <input type="file" id="popup-resume-input" accept=".pdf" hidden>
  </div>

  <div id="clips-container">
    <div class="empty">
      <div class="empty-icon">&#9986;</div>
      Loading clips...
    </div>
  </div>

  <script src="lib/clyde-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
